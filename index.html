<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d1b2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TST Driver">
  <title>TST Driver App</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: #0d1b2a; color: #e2e8f0; margin: 0; padding: 0; }
    .screen { display: none; min-height: 100dvh; flex-direction: column; }
    .screen.active { display: flex; }
    .content-area { flex: 1; overflow-y: auto; padding-bottom: 72px; }
    .status-pending   { background: #1e293b; border-color: #334155; }
    .status-delivered { background: #064e3b; border-color: #059669; }
    .status-failed    { background: #450a0a; border-color: #dc2626; }
    @keyframes slide-up { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .slide-up { animation: slide-up 0.2s ease; }
    #toast { position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%); z-index: 9999; pointer-events: none; white-space: nowrap; transition: opacity 0.3s; }
    #loading-overlay { position: fixed; inset: 0; background: rgba(13,27,42,0.88); z-index: 9998; display: none; align-items: center; justify-content: center; }
    #loading-overlay.show { display: flex; }
    #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 9990; display: none; align-items: flex-end; }
    #modal-overlay.open { display: flex; }
    #modal-box { width: 100%; max-height: 88dvh; background: #1e293b; border-radius: 20px 20px 0 0; overflow-y: auto; padding: 24px 20px 32px; }
    input[type=time]::-webkit-calendar-picker-indicator { filter: invert(1) opacity(0.5); }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
  </style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div id="loading-overlay">
  <div class="text-center">
    <i class="fas fa-truck-moving text-4xl text-emerald-400 mb-3 block" style="animation:bounce 1s infinite;"></i>
    <p class="text-emerald-300 font-bold text-sm tracking-wide">กำลังโหลด...</p>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="hidden">
  <div id="toast-inner" class="px-5 py-3 rounded-2xl font-bold text-sm shadow-2xl"></div>
</div>

<!-- MODAL (Status Update) -->
<div id="modal-overlay">
  <div id="modal-box">
    <div id="modal-content"></div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════ -->
<!--  SCREEN: LOGIN                                          -->
<!-- ════════════════════════════════════════════════════════ -->
<div id="screen-login" class="screen active items-center justify-center px-6 py-8"
     style="background:linear-gradient(155deg,#0d1b2a 0%,#1e3a8a 55%,#065f46 100%);min-height:100dvh;">
  <div class="w-full max-w-sm">

    <div class="text-center mb-8">
      <div class="w-20 h-20 mx-auto rounded-2xl flex items-center justify-center mb-4 shadow-xl"
           style="background:rgba(5,150,105,0.18);border:2px solid rgba(5,150,105,0.4);">
        <i class="fas fa-truck text-4xl text-emerald-400"></i>
      </div>
      <h1 class="text-2xl font-black text-white tracking-wide">TST Driver</h1>
      <p class="text-emerald-300 text-sm font-semibold mt-1">ระบบสำหรับพนักงานขับรถ</p>
    </div>

    <div class="rounded-2xl p-6 space-y-4" style="background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.12);">
      <div>
        <label class="text-xs font-black text-emerald-300 uppercase mb-2 block tracking-wider">ชื่อผู้ใช้</label>
        <input id="inp-user" type="text" inputmode="text" autocomplete="username"
          class="w-full rounded-xl px-4 py-3 font-bold text-white text-base outline-none transition-all"
          style="background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);"
          placeholder="กรอกชื่อผู้ใช้">
      </div>
      <div>
        <label class="text-xs font-black text-emerald-300 uppercase mb-2 block tracking-wider">รหัสผ่าน</label>
        <div class="relative">
          <input id="inp-pwd" type="password" autocomplete="current-password"
            class="w-full rounded-xl px-4 py-3 font-bold text-white text-base outline-none pr-12 transition-all"
            style="background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);"
            placeholder="กรอกรหัสผ่าน">
          <button type="button" onclick="togglePwd()"
            class="absolute right-3 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center text-white/50 hover:text-white/80">
            <i class="fas fa-eye text-sm" id="pwd-eye"></i>
          </button>
        </div>
      </div>
      <div id="login-err" class="hidden text-rose-400 text-sm font-bold text-center bg-rose-900/30 rounded-xl py-2"></div>
      <button id="btn-login" onclick="doLogin()"
        class="w-full py-3.5 rounded-xl font-black text-white text-base transition-all active:scale-95 shadow-lg flex items-center justify-center gap-2"
        style="background:#059669;">
        <i class="fas fa-sign-in-alt"></i> เข้าสู่ระบบ
      </button>
    </div>

    <p class="text-center text-white/25 text-xs mt-6 font-semibold">TST Standard Steel &bull; Powered by Supabase</p>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════ -->
<!--  SCREEN: MAIN                                           -->
<!-- ════════════════════════════════════════════════════════ -->
<div id="screen-main" class="screen" style="background:#0f172a;">

  <!-- HEADER -->
  <div class="px-4 py-3 flex items-center justify-between shrink-0"
       style="background:#0d1b2a;border-bottom:1px solid rgba(255,255,255,0.06);">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-emerald-800 flex items-center justify-center shrink-0">
        <i class="fas fa-id-badge text-emerald-200 text-lg"></i>
      </div>
      <div class="min-w-0">
        <div class="font-black text-white text-sm truncate" id="hdr-name">–</div>
        <div class="text-xs text-emerald-400 font-bold" id="hdr-truck">–</div>
      </div>
    </div>
    <div class="flex items-center gap-2 shrink-0">
      <div class="text-right">
        <div class="text-xs font-black text-slate-300" id="hdr-date">–</div>
        <div class="text-[10px] text-slate-500 font-semibold" id="hdr-time">–</div>
      </div>
      <button onclick="doLogout()"
        class="w-9 h-9 rounded-xl flex items-center justify-center text-slate-500 hover:text-rose-400 transition-all"
        style="background:#1e293b;">
        <i class="fas fa-sign-out-alt text-sm"></i>
      </button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content-area">

    <!-- ── TAB: แผนวันนี้ ─────────────────────── -->
    <div id="tab-plan" class="tab-pane p-4 space-y-3">

      <!-- Stats -->
      <div class="grid grid-cols-3 gap-2">
        <div class="rounded-xl p-3 text-center" style="background:#1e293b;">
          <div class="text-2xl font-black text-white" id="stat-total">–</div>
          <div class="text-[10px] text-slate-500 font-bold mt-0.5">จุดส่งทั้งหมด</div>
        </div>
        <div class="rounded-xl p-3 text-center" style="background:#064e3b;">
          <div class="text-2xl font-black text-emerald-400" id="stat-done">0</div>
          <div class="text-[10px] text-slate-400 font-bold mt-0.5">ส่งสำเร็จ</div>
        </div>
        <div class="rounded-xl p-3 text-center" style="background:#450a0a;">
          <div class="text-2xl font-black text-rose-400" id="stat-fail">0</div>
          <div class="text-[10px] text-slate-400 font-bold mt-0.5">ส่งไม่ได้</div>
        </div>
      </div>

      <!-- Refresh button -->
      <button onclick="loadPlan()" class="w-full py-2 rounded-xl font-bold text-sm text-slate-400 flex items-center justify-center gap-2 active:scale-95 transition-all" style="background:#1e293b;">
        <i class="fas fa-sync-alt text-xs"></i> รีเฟรชแผน
      </button>

      <!-- Plan list -->
      <div id="plan-list"></div>

    </div>

    <!-- ── TAB: บันทึกงาน ─────────────────────── -->
    <div id="tab-worklog" class="tab-pane hidden p-4 space-y-3">

      <div class="rounded-2xl p-4 space-y-3" style="background:#1e293b;">
        <h3 class="font-black text-white text-sm flex items-center gap-2">
          <i class="fas fa-tachometer-alt text-emerald-400"></i> บันทึกไมล์ & เวลา
          <span class="text-[10px] text-slate-500 font-semibold ml-auto" id="wl-saved-badge"></span>
        </h3>

        <div>
          <label class="text-[10px] font-black text-slate-400 uppercase mb-1.5 block">เชื่อมกับแผน</label>
          <select id="wl-plan" class="w-full rounded-xl px-3 py-2.5 font-bold text-white text-sm outline-none"
                  style="background:#0f172a;border:1px solid #334155;">
            <option value="">– ไม่ระบุแผน –</option>
          </select>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-[10px] font-black text-slate-400 uppercase mb-1.5 block">ไมล์เริ่ม</label>
            <input id="wl-odom-s" type="number" inputmode="numeric"
              class="w-full rounded-xl px-3 py-2.5 font-black text-white text-right text-sm outline-none"
              style="background:#0f172a;border:1px solid #334155;" placeholder="0">
          </div>
          <div>
            <label class="text-[10px] font-black text-slate-400 uppercase mb-1.5 block">ไมล์ปลาย</label>
            <input id="wl-odom-e" type="number" inputmode="numeric" oninput="wlCalc()"
              class="w-full rounded-xl px-3 py-2.5 font-black text-white text-right text-sm outline-none"
              style="background:#0f172a;border:1px solid #334155;" placeholder="0">
          </div>
        </div>

        <div class="rounded-xl px-4 py-2.5 text-center text-sm" style="background:#0f172a;">
          <span class="text-slate-400 font-semibold">ระยะทางวันนี้: </span>
          <span class="font-black text-emerald-400" id="wl-km">– กม.</span>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-[10px] font-black text-slate-400 uppercase mb-1.5 block">เวลาออกงาน</label>
            <input id="wl-dep" type="time"
              class="w-full rounded-xl px-3 py-2.5 font-black text-white text-sm outline-none"
              style="background:#0f172a;border:1px solid #334155;">
          </div>
          <div>
            <label class="text-[10px] font-black text-slate-400 uppercase mb-1.5 block">เวลาเสร็จงาน</label>
            <input id="wl-arr" type="time"
              class="w-full rounded-xl px-3 py-2.5 font-black text-white text-sm outline-none"
              style="background:#0f172a;border:1px solid #334155;">
          </div>
        </div>

        <div>
          <label class="text-[10px] font-black text-slate-400 uppercase mb-1.5 block">หมายเหตุ</label>
          <textarea id="wl-note" rows="2"
            class="w-full rounded-xl px-3 py-2.5 font-semibold text-white text-sm outline-none resize-none"
            style="background:#0f172a;border:1px solid #334155;" placeholder="(ถ้ามี)"></textarea>
        </div>

        <button onclick="wlSave()"
          class="w-full py-3 rounded-xl font-black text-white text-sm active:scale-95 transition-all flex items-center justify-center gap-2"
          style="background:#059669;">
          <i class="fas fa-save"></i> บันทึกข้อมูล
        </button>
      </div>

    </div>

    <!-- ── TAB: ประวัติ ───────────────────────── -->
    <div id="tab-history" class="tab-pane hidden p-4 space-y-3">

      <div class="flex gap-2 items-center">
        <input type="date" id="hist-from"
          class="flex-1 rounded-xl px-3 py-2.5 text-white text-sm font-bold outline-none"
          style="background:#1e293b;border:1px solid #334155;">
        <input type="date" id="hist-to"
          class="flex-1 rounded-xl px-3 py-2.5 text-white text-sm font-bold outline-none"
          style="background:#1e293b;border:1px solid #334155;">
        <button onclick="histLoad()"
          class="w-11 h-11 rounded-xl flex items-center justify-center font-black text-white active:scale-95 transition-all shrink-0"
          style="background:#059669;">
          <i class="fas fa-search text-sm"></i>
        </button>
      </div>

      <div id="hist-list">
        <div class="text-center py-16 text-slate-600">
          <i class="fas fa-history text-4xl mb-3 block opacity-30"></i>
          <p class="font-bold text-sm">เลือกช่วงวันที่แล้วกดค้นหา</p>
        </div>
      </div>

    </div>

  </div><!-- end content-area -->

  <!-- BOTTOM NAV -->
  <nav class="fixed bottom-0 left-0 right-0 flex items-stretch" style="background:#0d1b2a;border-top:1px solid rgba(255,255,255,0.07);height:64px;z-index:100;">
    <button id="nav-plan" onclick="goTab('plan')"
      class="flex-1 flex flex-col items-center justify-center gap-1 transition-all text-emerald-400">
      <i class="fas fa-clipboard-list text-lg"></i>
      <span class="text-[10px] font-black">แผนวันนี้</span>
    </button>
    <button id="nav-worklog" onclick="goTab('worklog')"
      class="flex-1 flex flex-col items-center justify-center gap-1 transition-all text-slate-500">
      <i class="fas fa-tachometer-alt text-lg"></i>
      <span class="text-[10px] font-black">บันทึกงาน</span>
    </button>
    <button id="nav-history" onclick="goTab('history')"
      class="flex-1 flex flex-col items-center justify-center gap-1 transition-all text-slate-500">
      <i class="fas fa-history text-lg"></i>
      <span class="text-[10px] font-black">ประวัติ</span>
    </button>
  </nav>

</div><!-- end screen-main -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ── Config ────────────────────────────────────────────────
const SUPA_URL = 'https://lkuunmyrxugsoqwrvdby.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxrdXVubXlyeHVnc29xd3J2ZGJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1ODk5ODcsImV4cCI6MjA5NzE2NTk4N30.rpcJKRMDumcsgYx-JrgxFKeO26TKrIULxBJm0jWpBZw';
const _sb = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── Session ───────────────────────────────────────────────
var _sess = null; // { username, driver_name, truck_plate }

function sessSave(s)  { localStorage.setItem('tst_drv', JSON.stringify(s)); }
function sessLoad()   { try { return JSON.parse(localStorage.getItem('tst_drv')||'null'); } catch { return null; } }
function sessClear()  { localStorage.removeItem('tst_drv'); }

// ── Boot ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(function(){});
    }
    _sess = sessLoad();
    if (_sess && _sess.username) {
        bootMain();
    } else {
        document.getElementById('screen-login').classList.add('active');
        hideLoad();
    }
    // keyboard listeners
    document.getElementById('inp-user').addEventListener('keydown', function(e){ if(e.key==='Enter') document.getElementById('inp-pwd').focus(); });
    document.getElementById('inp-pwd').addEventListener('keydown',  function(e){ if(e.key==='Enter') doLogin(); });
    setInterval(tickClock, 1000); tickClock();
});

function tickClock() {
    var n = new Date();
    var days = ['อา.','จ.','อ.','พ.','พฤ.','ศ.','ส.'];
    var mos  = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    var de = document.getElementById('hdr-date'), te = document.getElementById('hdr-time');
    if (de) de.textContent = days[n.getDay()] + ' ' + n.getDate() + ' ' + mos[n.getMonth()] + ' ' + (n.getFullYear()+543);
    if (te) te.textContent = pad(n.getHours())+':'+pad(n.getMinutes());
}
function pad(n) { return String(n).padStart(2,'0'); }

// ── Login ─────────────────────────────────────────────────
function togglePwd() {
    var inp = document.getElementById('inp-pwd'), eye = document.getElementById('pwd-eye');
    if (inp.type==='password') { inp.type='text'; eye.className='fas fa-eye-slash text-sm'; }
    else { inp.type='password'; eye.className='fas fa-eye text-sm'; }
}

async function doLogin() {
    var user = document.getElementById('inp-user').value.trim();
    var pwd  = document.getElementById('inp-pwd').value;
    var err  = document.getElementById('login-err');
    var btn  = document.getElementById('btn-login');
    err.classList.add('hidden');
    if (!user || !pwd) { err.textContent='กรุณากรอกข้อมูลให้ครบ'; err.classList.remove('hidden'); return; }
    btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-spin mr-2"></i>กำลังเข้าสู่ระบบ...';
    var {data,error} = await _sb.from('driver_users').select('*').eq('username',user).eq('active',true).maybeSingle();
    btn.disabled=false; btn.innerHTML='<i class="fas fa-sign-in-alt mr-2"></i>เข้าสู่ระบบ';
    if (error||!data) { err.textContent='ไม่พบผู้ใช้งาน หรือบัญชีถูกระงับ'; err.classList.remove('hidden'); return; }
    if (data.password!==pwd) { err.textContent='รหัสผ่านไม่ถูกต้อง'; err.classList.remove('hidden'); return; }
    _sess = { username:data.username, driver_name:data.driver_name, truck_plate:data.truck_plate };
    sessSave(_sess);
    bootMain();
}

function doLogout() {
    if (!confirm('ออกจากระบบ?')) return;
    sessClear(); _sess=null;
    document.getElementById('screen-main').classList.remove('active');
    document.getElementById('screen-login').classList.add('active');
}

// ── Boot Main ─────────────────────────────────────────────
function bootMain() {
    document.getElementById('screen-login').classList.remove('active');
    document.getElementById('screen-main').classList.add('active');
    document.getElementById('hdr-name').textContent  = _sess.driver_name || _sess.username;
    document.getElementById('hdr-truck').textContent = _sess.truck_plate ? '🚛 '+_sess.truck_plate : '– ไม่ระบุรถ –';
    hideLoad();
    // Default hist dates
    var today = new Date().toISOString().split('T')[0];
    var wago  = new Date(); wago.setDate(wago.getDate()-6);
    document.getElementById('hist-from').value = wago.toISOString().split('T')[0];
    document.getElementById('hist-to').value   = today;
    goTab('plan');
    loadPlan();
}

// ── Tab navigation ────────────────────────────────────────
var _tab = 'plan';
function goTab(t) {
    _tab = t;
    document.querySelectorAll('.tab-pane').forEach(function(el){ el.classList.add('hidden'); });
    var pane = document.getElementById('tab-'+t);
    if (pane) pane.classList.remove('hidden');
    ['plan','worklog','history'].forEach(function(n) {
        var nb = document.getElementById('nav-'+n);
        if (!nb) return;
        if (n===t) { nb.style.color='#34d399'; }
        else       { nb.style.color='#64748b'; }
    });
    if (t==='worklog') wlLoad();
}

// ── TODAY PLAN ────────────────────────────────────────────
var _plans = [], _confs = {};

async function loadPlan() {
    var today = new Date().toISOString().split('T')[0];
    var truck = _sess.truck_plate;
    document.getElementById('plan-list').innerHTML = '<div class="text-center py-12 text-slate-500"><i class="fas fa-spinner fa-spin text-2xl mb-2 block"></i><p class="text-sm font-bold">กำลังโหลด...</p></div>';
    document.getElementById('stat-total').textContent='–';
    document.getElementById('stat-done').textContent='0';
    document.getElementById('stat-fail').textContent='0';

    if (!truck) { renderPlan([]); return; }

    showLoad();
    var {data:plans, error} = await _sb.from('logistic_plans')
        .select('plan_id,plan_date,status,truck_plate,child_plate,driver_id,shops,is_mother,is_child')
        .eq('plan_date', today)
        .neq('status','success')
        .or('truck_plate.eq.'+truck+',child_plate.eq.'+truck);
    hideLoad();

    if (error) { showToast('❌ โหลดแผนไม่สำเร็จ',true); renderPlan([]); return; }
    _plans = plans||[];

    // Populate worklog plan selector
    var sel=document.getElementById('wl-plan');
    if(sel) { sel.innerHTML='<option value="">– ไม่ระบุแผน –</option>'+_plans.map(function(p){return '<option value="'+esc(p.plan_id)+'">'+esc(p.plan_id)+'</option>';}).join(''); }

    if (!_plans.length) { renderPlan([]); return; }

    var ids = _plans.map(function(p){return p.plan_id;});
    var {data:confs} = await _sb.from('delivery_confirmations').select('*').in('plan_id',ids);
    _confs={};
    (confs||[]).forEach(function(c){ _confs[c.plan_id+'|'+c.shop_seq]=c; });
    renderPlan(_plans);
}

function renderPlan(plans) {
    var wrap=document.getElementById('plan-list');
    if (!plans.length) {
        wrap.innerHTML='<div class="text-center py-14 text-slate-600"><i class="fas fa-clipboard-check text-5xl mb-3 block opacity-20"></i><p class="font-black text-slate-400 text-base">ไม่มีแผนวันนี้</p><p class="text-sm mt-1">ระบบไม่พบแผนจัดส่งสำหรับรถ '+esc(_sess.truck_plate||'ของคุณ')+'</p></div>';
        document.getElementById('stat-total').textContent=0;
        return;
    }
    var sLabel={pending:'รอส่ง',delivered:'ส่งสำเร็จ',failed:'ส่งไม่ได้'};
    var sIcon ={pending:'fa-clock',delivered:'fa-check-circle',failed:'fa-times-circle'};
    var sColor={pending:'#94a3b8',delivered:'#34d399',failed:'#f87171'};

    var allShops=[];
    plans.forEach(function(p){
        (p.shops||[]).forEach(function(shop,si){
            var c=_confs[p.plan_id+'|'+si];
            allShops.push({
                planId:p.plan_id, shopSeq:si,
                shopId:shop.shopId||'', shopName:shop.shopName||shop.shopId||'–',
                items:shop.items||[], status:c?c.status:'pending',
                note:c?c.note:'', confId:c?c.id:null
            });
        });
    });

    var done=allShops.filter(function(s){return s.status==='delivered';}).length;
    var fail=allShops.filter(function(s){return s.status==='failed';}).length;
    document.getElementById('stat-total').textContent=allShops.length;
    document.getElementById('stat-done').textContent=done;
    document.getElementById('stat-fail').textContent=fail;

    wrap.innerHTML='<div class="space-y-2">'+allShops.map(function(shop,i){
        var qty=shop.items.reduce(function(s,it){return s+(it.qty||0);},0);
        var bdr=shop.status==='delivered'?'#059669':shop.status==='failed'?'#dc2626':'#334155';
        var bg =shop.status==='delivered'?'#064e3b':shop.status==='failed'?'#450a0a':'#1e293b';
        var itemRows=shop.items.slice(0,3).map(function(it){
            return '<div class="flex justify-between text-[10px] text-slate-400"><span class="truncate max-w-[170px]">'+esc(it.productName||it.sku||'')+'</span><span class="font-black text-slate-300 ml-1 shrink-0">'+Number(it.qty||0).toLocaleString()+' ชิ้น</span></div>';
        }).join('');
        return '<div class="rounded-2xl border-2 p-4 cursor-pointer active:scale-[0.97] transition-all slide-up" style="background:'+bg+';border-color:'+bdr+';" onclick=\'openModal('+JSON.stringify(shop)+')\'>'
            +'<div class="flex items-start justify-between gap-2">'
            +'<div class="flex items-center gap-3 min-w-0">'
            +'<div class="w-8 h-8 rounded-full flex items-center justify-center font-black text-sm shrink-0" style="background:#334155;color:#94a3b8;">'+(i+1)+'</div>'
            +'<div class="min-w-0"><div class="font-black text-white text-sm truncate">'+esc(shop.shopName)+'</div>'
            +'<div class="text-[10px] text-slate-500 font-semibold mt-0.5">'+esc(shop.shopId)+' &bull; '+shop.items.length+' รายการ &bull; '+qty.toLocaleString()+' ชิ้น</div></div>'
            +'</div>'
            +'<div class="flex flex-col items-end gap-0.5 shrink-0">'
            +'<span class="text-xs font-black flex items-center gap-1" style="color:'+sColor[shop.status]+'">'
            +'<i class="fas '+sIcon[shop.status]+' text-sm"></i>'+sLabel[shop.status]+'</span>'
            +(shop.note?'<span class="text-[10px] text-amber-400 max-w-[100px] text-right truncate">'+esc(shop.note)+'</span>':'')
            +'</div></div>'
            +(shop.items.length?'<div class="mt-2.5 pt-2 border-t space-y-1" style="border-color:rgba(255,255,255,0.08);">'+itemRows+(shop.items.length>3?'<div class="text-[10px] text-slate-600">+'+( shop.items.length-3)+' รายการ...</div>':'')+'</div>':'')
            +'</div>';
    }).join('')+'</div>';
}

// ── Status Modal ──────────────────────────────────────────
var _mShop=null;
function openModal(shop) {
    _mShop=shop;
    var qty=(shop.items||[]).reduce(function(s,it){return s+(it.qty||0);},0);
    var btns=[
        {s:'pending',   lbl:'รอส่ง',     icon:'fa-clock',        bg:'#334155',bg2:'#475569'},
        {s:'delivered', lbl:'ส่งสำเร็จ', icon:'fa-check-circle', bg:'#065f46',bg2:'#047857'},
        {s:'failed',    lbl:'ส่งไม่ได้', icon:'fa-times-circle', bg:'#7f1d1d',bg2:'#991b1b'},
    ];
    document.getElementById('modal-content').innerHTML=
        '<div class="flex items-center justify-between mb-3">'
        +'<h3 class="font-black text-white text-base">'+esc(shop.shopName)+'</h3>'
        +'<button onclick="closeModal()" class="w-8 h-8 rounded-full flex items-center justify-center text-slate-400 hover:text-white" style="background:#334155;"><i class="fas fa-times text-sm"></i></button>'
        +'</div>'
        +'<div class="text-xs text-slate-400 mb-3">'+esc(shop.shopId)+' &bull; '+shop.items.length+' รายการ &bull; รวม '+qty.toLocaleString()+' ชิ้น</div>'
        +(shop.items.length?
            '<div class="rounded-xl p-3 mb-4 space-y-1.5 overflow-y-auto" style="background:#0f172a;max-height:120px;">'
            +(shop.items||[]).map(function(it){
                return '<div class="flex justify-between text-xs"><span class="text-slate-300 truncate max-w-[180px]">'+esc(it.productName||it.sku||'')+'</span>'
                +'<span class="font-black text-white ml-2 shrink-0">'+Number(it.qty||0).toLocaleString()+' ชิ้น</span></div>';
            }).join('')+'</div>':'')
        +'<p class="text-[10px] font-black text-slate-400 uppercase mb-2 tracking-wider">อัพเดทสถานะ</p>'
        +'<div class="grid grid-cols-3 gap-2 mb-4" id="status-btns">'
        +btns.map(function(b){
            var active=shop.status===b.s;
            return '<button onclick="pickStatus(\''+b.s+'\')" id="sbtn-'+b.s+'" class="py-3.5 rounded-xl font-black text-xs text-white flex flex-col items-center gap-1.5 active:scale-95 transition-all'+(active?' ring-2 ring-white ring-offset-1 ring-offset-slate-800':'')+'" style="background:'+(active?b.bg2:b.bg)+';">'
            +'<i class="fas '+b.icon+' text-lg"></i>'+b.lbl+'</button>';
        }).join('')+'</div>'
        +'<p class="text-[10px] font-black text-slate-400 uppercase mb-1.5 tracking-wider">หมายเหตุ</p>'
        +'<textarea id="modal-note" rows="2" class="w-full rounded-xl px-3 py-2.5 font-semibold text-white text-sm outline-none resize-none mb-4" style="background:#0f172a;border:1px solid #334155;" placeholder="(ถ้ามี)">'+esc(shop.note||'')+'</textarea>'
        +'<button onclick="saveStatus()" class="w-full py-3.5 rounded-xl font-black text-white text-sm flex items-center justify-center gap-2 active:scale-95 transition-all" style="background:#059669;"><i class="fas fa-check"></i> บันทึกสถานะ</button>';

    document.getElementById('modal-overlay').classList.add('open');
}

function pickStatus(s) {
    if (_mShop) _mShop.status=s;
    var colors={pending:'#334155',delivered:'#065f46',failed:'#7f1d1d'};
    var colors2={pending:'#475569',delivered:'#047857',failed:'#991b1b'};
    ['pending','delivered','failed'].forEach(function(x){
        var b=document.getElementById('sbtn-'+x);
        if(!b) return;
        b.style.background=x===s?colors2[x]:colors[x];
        if(x===s){ b.classList.add('ring-2','ring-white','ring-offset-1'); b.style.setProperty('--tw-ring-offset-color','#1e293b'); }
        else { b.classList.remove('ring-2','ring-white','ring-offset-1'); }
    });
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); _mShop=null; }
document.getElementById('modal-overlay').addEventListener('click',function(e){ if(e.target===this) closeModal(); });

async function saveStatus() {
    if (!_mShop) return;
    var note=document.getElementById('modal-note').value||'';
    var status=_mShop.status||'pending';
    var now=new Date().toISOString();
    var payload={plan_id:_mShop.planId, shop_id:_mShop.shopId, shop_name:_mShop.shopName,
        shop_seq:_mShop.shopSeq, status:status, note:note, driver_username:_sess.username, confirmed_at:now};
    showLoad();
    var res;
    if (_mShop.confId) {
        res=await _sb.from('delivery_confirmations').update({status:status,note:note,confirmed_at:now}).eq('id',_mShop.confId);
    } else {
        res=await _sb.from('delivery_confirmations').insert(payload);
    }
    hideLoad();
    if (res.error) { showToast('❌ '+res.error.message,true); return; }
    closeModal();
    showToast('✅ อัพเดทสถานะเรียบร้อย');
    loadPlan();
}

// ── Work Log ──────────────────────────────────────────────
var _wlId=null;

async function wlLoad() {
    var today=new Date().toISOString().split('T')[0];
    var {data}=await _sb.from('driver_work_logs').select('*')
        .eq('driver_username',_sess.username).eq('work_date',today)
        .order('created_at',{ascending:false}).limit(1).maybeSingle();
    if (data) {
        _wlId=data.id;
        document.getElementById('wl-odom-s').value=data.odometer_start||'';
        document.getElementById('wl-odom-e').value=data.odometer_end||'';
        document.getElementById('wl-dep').value=data.time_depart||'';
        document.getElementById('wl-arr').value=data.time_arrive||'';
        document.getElementById('wl-note').value=data.note||'';
        if(data.plan_id&&document.getElementById('wl-plan')) document.getElementById('wl-plan').value=data.plan_id;
        document.getElementById('wl-saved-badge').textContent='(โหลดจากระบบ)';
        wlCalc();
    } else {
        _wlId=null;
        document.getElementById('wl-saved-badge').textContent='';
    }
}

function wlCalc() {
    var s=parseFloat(document.getElementById('wl-odom-s').value);
    var e=parseFloat(document.getElementById('wl-odom-e').value);
    var el=document.getElementById('wl-km');
    if (!isNaN(s)&&!isNaN(e)&&e>s) { el.textContent=(e-s).toLocaleString('th-TH',{maximumFractionDigits:1})+' กม.'; el.style.color='#34d399'; }
    else { el.textContent='– กม.'; el.style.color='#94a3b8'; }
}

async function wlSave() {
    var today=new Date().toISOString().split('T')[0];
    var payload={driver_username:_sess.username, plan_id:document.getElementById('wl-plan').value||'',
        work_date:today, odometer_start:parseFloat(document.getElementById('wl-odom-s').value)||0,
        odometer_end:parseFloat(document.getElementById('wl-odom-e').value)||0,
        time_depart:document.getElementById('wl-dep').value||'',
        time_arrive:document.getElementById('wl-arr').value||'',
        note:document.getElementById('wl-note').value||'', updated_at:new Date().toISOString()};
    showLoad();
    var res;
    if (_wlId) { res=await _sb.from('driver_work_logs').update(payload).eq('id',_wlId); }
    else { res=await _sb.from('driver_work_logs').insert(payload); if(!res.error&&res.data&&res.data[0]) _wlId=res.data[0].id; }
    hideLoad();
    if (res.error) { showToast('❌ '+res.error.message,true); return; }
    showToast('✅ บันทึกข้อมูลเรียบร้อย');
    document.getElementById('wl-saved-badge').textContent='(บันทึกแล้ว)';
}

// ── History ───────────────────────────────────────────────
async function histLoad() {
    var from=document.getElementById('hist-from').value;
    var to  =document.getElementById('hist-to').value;
    if (!from||!to) { showToast('⚠️ กรุณาเลือกช่วงวันที่',true); return; }
    showLoad();
    var {data:logs}=await _sb.from('driver_work_logs').select('*')
        .eq('driver_username',_sess.username).gte('work_date',from).lte('work_date',to)
        .order('work_date',{ascending:false});
    var {data:confs}=await _sb.from('delivery_confirmations').select('plan_id,shop_name,shop_id,status,confirmed_at')
        .eq('driver_username',_sess.username)
        .gte('confirmed_at',from+'T00:00:00Z').lte('confirmed_at',to+'T23:59:59Z')
        .order('confirmed_at',{ascending:false});
    hideLoad();
    var wrap=document.getElementById('hist-list');
    if ((!logs||!logs.length)&&(!confs||!confs.length)) {
        wrap.innerHTML='<div class="text-center py-12 text-slate-600"><i class="fas fa-inbox text-4xl mb-3 block opacity-20"></i><p class="font-bold text-sm">ไม่มีข้อมูลในช่วงนี้</p></div>'; return;
    }
    var mos=['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    function fmtD(d) { if(!d) return '–'; var p=String(d).substring(0,10).split('-'); return p[2]+' '+mos[+p[1]]+' '+(+p[0]+543); }
    var confByDate={};
    (confs||[]).forEach(function(c){ var d=(c.confirmed_at||'').substring(0,10); if(!confByDate[d]) confByDate[d]=[]; confByDate[d].push(c); });
    var logByDate={};
    (logs||[]).forEach(function(l){ logByDate[l.work_date]=l; });
    var allDates=Array.from(new Set([...(logs||[]).map(function(l){return l.work_date;}), ...Object.keys(confByDate)])).sort().reverse();
    wrap.innerHTML=allDates.map(function(date){
        var log=logByDate[date];
        var dc =confByDate[date]||[];
        var km =log&&log.odometer_end>log.odometer_start?(log.odometer_end-log.odometer_start):0;
        var done=dc.filter(function(c){return c.status==='delivered';}).length;
        var fail=dc.filter(function(c){return c.status==='failed';}).length;
        var shopRows=dc.slice(0,5).map(function(c){
            var ic=c.status==='delivered'?'fa-check-circle':'c.status==="failed"'?'fa-times-circle':'fa-clock';
            var col=c.status==='delivered'?'#34d399':c.status==='failed'?'#f87171':'#94a3b8';
            return '<div class="flex justify-between text-xs py-1" style="border-bottom:1px solid rgba(255,255,255,0.04);">'
                +'<span class="text-slate-400 truncate max-w-[200px]">'+esc(c.shop_name||c.shop_id||'')+'</span>'
                +'<span class="font-bold shrink-0" style="color:'+col+';">'+(c.status==='delivered'?'✓ ส่งแล้ว':c.status==='failed'?'✗ ไม่ได้':'รอ')+'</span>'
                +'</div>';
        }).join('');
        return '<div class="rounded-2xl p-4 space-y-3 slide-up" style="background:#1e293b;">'
            +'<div class="flex items-center justify-between">'
            +'<span class="font-black text-white text-sm">'+fmtD(date)+'</span>'
            +'<div class="flex gap-2">'
            +(done?'<span class="text-[10px] font-bold px-2 py-0.5 rounded-full" style="background:#064e3b;color:#34d399;">✓ '+done+' ส่งแล้ว</span>':'')
            +(fail?'<span class="text-[10px] font-bold px-2 py-0.5 rounded-full" style="background:#450a0a;color:#f87171;">✗ '+fail+' ไม่ได้</span>':'')
            +'</div></div>'
            +(log?'<div class="grid grid-cols-3 gap-2 text-center">'
                +'<div class="rounded-xl py-2" style="background:#0f172a;"><div class="font-black text-emerald-400 text-sm">'+(km>0?km.toLocaleString():'–')+'</div><div class="text-[10px] text-slate-500">กม.</div></div>'
                +'<div class="rounded-xl py-2" style="background:#0f172a;"><div class="font-black text-white text-sm">'+(log.time_depart||'–')+'</div><div class="text-[10px] text-slate-500">ออกงาน</div></div>'
                +'<div class="rounded-xl py-2" style="background:#0f172a;"><div class="font-black text-white text-sm">'+(log.time_arrive||'–')+'</div><div class="text-[10px] text-slate-500">เสร็จงาน</div></div>'
                +'</div>'+(log.note?'<div class="text-xs text-slate-400 rounded-xl px-3 py-2" style="background:#0f172a;">'+esc(log.note)+'</div>':''):'')
            +(dc.length?'<div class="space-y-0">'+shopRows+(dc.length>5?'<div class="text-[10px] text-slate-600 pt-1">+'+( dc.length-5)+' จุดเพิ่มเติม...</div>':'')+'</div>':'')
            +'</div>';
    }).join('');
}

// ── Utilities ─────────────────────────────────────────────
function showLoad() { document.getElementById('loading-overlay').classList.add('show'); }
function hideLoad() { document.getElementById('loading-overlay').classList.remove('show'); }

var _tt=null;
function showToast(msg,isErr) {
    var el=document.getElementById('toast'), inn=document.getElementById('toast-inner');
    inn.textContent=msg;
    inn.className='px-5 py-3 rounded-2xl font-bold text-sm shadow-2xl '+(isErr?'bg-rose-600 text-white':'bg-emerald-600 text-white');
    el.classList.remove('hidden'); el.style.opacity='1';
    if(_tt) clearTimeout(_tt);
    _tt=setTimeout(function(){ el.style.opacity='0'; setTimeout(function(){el.classList.add('hidden');},300); },2800);
}

function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
