<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ── Constants ────────────────────────────────────────────────
const SUPA_URL='https://lkuunmyrxugsoqwrvdby.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxrdXVubXlyeHVnc29xd3J2ZGJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1ODk5ODcsImV4cCI6MjA5NzE2NTk4N30.rpcJKRMDumcsgYx-JrgxFKeO26TKrIULxBJm0jWpBZw';
const _sb=supabase.createClient(SUPA_URL,SUPA_KEY);

// เวลาขั้นต่ำที่ต้องใช้เดินทาง (นาที) — ป้องกันกดมั่ว
const MIN_TRAVEL_MINS=10;
const PHOTO_BUCKET='delivery-photos';
// ระยะขั้นต่ำที่ต้องเคลื่อนที่จาก checkpoint ก่อนหน้า (เมตร) — ป้องกันกดถึงร้านขณะยังไม่ออกจากจุดเดิม
const MIN_MOVE_METERS=300;
// รหัสทดสอบ — bypass GPS, เวลา, รูป, ไมล์ทุกการตรวจสอบ
const TEST_USERNAMES=['test','ทดสอบ','demo'];
var TEST_MODE=false;

// คำนวนระยะทางระหว่าง 2 พิกัด (Haversine) → เมตร
function haversineM(lat1,lng1,lat2,lng2){
  var R=6371000,r=Math.PI/180;
  var dLat=(lat2-lat1)*r,dLng=(lng2-lng1)*r;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*r)*Math.cos(lat2*r)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ── State ────────────────────────────────────────────────────
var _sess=null;
var _plans=[],_tripLogs={};
var _tripPlan=null,_tripLog=null,_shopVisits={};
var _capturedFile=null,_capturedPreviewUrl=null;
var _selectedShopSeq=null; // ร้านที่คนขับเลือกจะไป (free order)
var _timerIv=null;
var _toastTimer=null;

// ── Utilities ────────────────────────────────────────────────
function showL(){document.getElementById('ld').classList.add('on');}
function hideL(){document.getElementById('ld').classList.remove('on');}
function p2(n){return String(n).padStart(2,'0');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function showToast(msg,isErr){
  var el=document.getElementById('toast'),ti=document.getElementById('ti');
  ti.textContent=msg;
  ti.style.background=isErr?'#dc2626':'#059669';
  ti.style.color='#fff';
  el.classList.remove('hidden');el.style.opacity='1';
  if(_toastTimer)clearTimeout(_toastTimer);
  _toastTimer=setTimeout(function(){el.style.opacity='0';setTimeout(function(){el.classList.add('hidden');},300);},3200);
}

function fmtTime(iso){
  if(!iso)return'–';
  var d=new Date(iso);
  return p2(d.getHours())+':'+p2(d.getMinutes());
}

function fmtDuration(fromIso,toIso){
  if(!fromIso||!toIso)return'–';
  var ms=new Date(toIso)-new Date(fromIso);
  var h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000);
  return (h>0?h+' ชม. ':'')+m+' นาที';
}

// วินาทีที่เหลือก่อนจะครบ MIN_TRAVEL_MINS นาทีจาก refTime
function remainSecs(refIso){
  if(!refIso)return 0;
  var elapsed=(Date.now()-new Date(refIso).getTime())/1000;
  return Math.max(0,Math.ceil(MIN_TRAVEL_MINS*60-elapsed));
}

// ── GPS ──────────────────────────────────────────────────────
function getGPS(){
  return new Promise(function(res,rej){
    if(!navigator.geolocation){rej('no_device');return;}
    navigator.geolocation.getCurrentPosition(
      function(p){res({lat:p.coords.latitude,lng:p.coords.longitude,acc:Math.round(p.coords.accuracy)});},
      function(e){rej(e.code);},
      {timeout:15000,enableHighAccuracy:true,maximumAge:0}
    );
  });
}

async function requireGPS(){
  if(TEST_MODE)return{lat:13.7563,lng:100.5018,acc:5}; // mock GPS กรุงเทพฯ
  try{return await getGPS();}
  catch(code){
    var msg=code===1?'❌ กรุณาอนุญาตให้ใช้ GPS ก่อน':
             code==='no_device'?'❌ อุปกรณ์ไม่รองรับ GPS':
             '❌ GPS timeout — ลองใหม่อีกครั้ง';
    showToast(msg,true);return null;
  }
}

// ── Session ──────────────────────────────────────────────────
function sS(s){localStorage.setItem('tst_drv',JSON.stringify(s));}
function sL(){try{return JSON.parse(localStorage.getItem('tst_drv')||'null');}catch{return null;}}
function sC(){localStorage.removeItem('tst_drv');}

// ── Boot ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',function(){
  if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(function(){});
  _sess=sL();
  if(_sess&&_sess.username){
    TEST_MODE=TEST_USERNAMES.indexOf(_sess.username.toLowerCase())!==-1;
    bootMain();
  }
  else{document.getElementById('sc-login').classList.add('active');hideL();}
  document.getElementById('iu').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('ip').focus();});
  document.getElementById('ip').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
  setInterval(tick,1000);tick();
});

function tick(){
  var n=new Date();
  var days=['อา.','จ.','อ.','พ.','พฤ.','ศ.','ส.'];
  var mos=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  var de=document.getElementById('hd'),te=document.getElementById('htime');
  if(de)de.textContent=days[n.getDay()]+' '+n.getDate()+' '+mos[n.getMonth()]+' '+(n.getFullYear()+543);
  if(te)te.textContent=p2(n.getHours())+':'+p2(n.getMinutes());
}

// ── Login ────────────────────────────────────────────────────
function togglePwd(){
  var i=document.getElementById('ip'),e=document.getElementById('pe');
  if(i.type==='password'){i.type='text';e.className='fas fa-eye-slash';}
  else{i.type='password';e.className='fas fa-eye';}
}

async function doLogin(){
  var user=document.getElementById('iu').value.trim();
  var pwd=document.getElementById('ip').value;
  var err=document.getElementById('le'),btn=document.getElementById('bl');
  err.style.display='none';
  if(!user||!pwd){err.textContent='กรุณากรอกข้อมูลให้ครบ';err.style.display='block';return;}
  btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> กำลังเข้าสู่ระบบ...';
  var {data,error}=await _sb.from('driver_users').select('*').eq('username',user).eq('active',true).maybeSingle();
  btn.disabled=false;btn.innerHTML='<i class="fas fa-sign-in-alt"></i> เข้าสู่ระบบ';
  if(error||!data){err.textContent='ไม่พบผู้ใช้งาน หรือบัญชีถูกระงับ';err.style.display='block';return;}
  if(data.password!==pwd){err.textContent='รหัสผ่านไม่ถูกต้อง';err.style.display='block';return;}
  _sess={username:data.username,driver_name:data.driver_name,driver_id:data.driver_id};
  TEST_MODE=TEST_USERNAMES.indexOf(data.username.toLowerCase())!==-1;
  sS(_sess);bootMain();
}

function doLogout(){
  if(!confirm('ออกจากระบบ?'))return;
  sC();_sess=null;
  document.getElementById('sc-main').classList.remove('active');
  document.getElementById('sc-login').classList.add('active');
}

function bootMain(){
  document.getElementById('sc-login').classList.remove('active');
  document.getElementById('sc-main').classList.add('active');
  document.getElementById('hn').textContent=_sess.driver_name||_sess.username;
  document.getElementById('ht').textContent='– รอโหลดแผน –';
  hideL();
  var today=new Date().toISOString().split('T')[0];
  var w=new Date();w.setDate(w.getDate()-13);
  document.getElementById('hf').value=w.toISOString().split('T')[0];
  document.getElementById('ht2').value=today;
  goTab('plan');loadPlan();
}

// ── Tabs ─────────────────────────────────────────────────────
function goTab(t){
  document.querySelectorAll('.tab-pane').forEach(function(el){el.style.display='none';});
  document.getElementById('tab-'+t).style.display='block';
  ['plan','history'].forEach(function(n){
    document.getElementById('nav-'+n).style.color=n===t?'#34d399':'#64748b';
  });
}

// ══════════════════════════════════════════════════════════════
// PLAN LIST
// ══════════════════════════════════════════════════════════════
async function loadPlan(){
  var today=new Date().toISOString().split('T')[0];
  document.getElementById('plan-cards').innerHTML='<div style="text-align:center;padding:60px 0;"><i class="fas fa-spinner fa-spin" style="font-size:28px;display:block;margin-bottom:12px;color:#475569;"></i><p style="font-weight:700;font-size:13px;color:#475569;">กำลังโหลด...</p></div>';
  if(!_sess.driver_id&&!_sess.driver_name){renderPlanCards([]);return;}
  showL();
  var orParts=[];
  if(_sess.driver_id) orParts.push('driver_id.eq.'+_sess.driver_id);
  if(_sess.driver_name) orParts.push('driver_transport.eq.'+_sess.driver_name);
  var {data:plans,error}=await _sb.from('logistic_plans')
    .select('plan_id,plan_date,status,truck_plate,child_plate,driver_id,driver_transport,shops,is_mother,is_child,job_type')
    .eq('plan_date',today).neq('status','success')
    .or(orParts.join(','));
  if(error){hideL();showToast('❌ โหลดแผนไม่สำเร็จ',true);renderPlanCards([]);return;}
  _plans=plans||[];
  _tripLogs={};
  if(_plans.length){
    var ids=_plans.map(function(p){return p.plan_id;});
    var {data:logs}=await _sb.from('trip_logs').select('*').in('plan_id',ids);
    (logs||[]).forEach(function(l){_tripLogs[l.plan_id]=l;});
    var trucks=Array.from(new Set(_plans.flatMap(function(p){return[p.truck_plate,p.child_plate].filter(Boolean);}))).join(', ');
    document.getElementById('ht').textContent=trucks?'🚛 '+trucks:'–';
  }else{
    document.getElementById('ht').textContent='– ไม่มีแผนวันนี้ –';
  }
  hideL();
  renderPlanCards(_plans);
}

function renderPlanCards(plans){
  var wrap=document.getElementById('plan-cards');
  if(!plans.length){
    wrap.innerHTML='<div style="text-align:center;padding:60px 0;">'
      +'<i class="fas fa-clipboard-check" style="font-size:48px;display:block;margin-bottom:12px;opacity:.25;color:#475569;"></i>'
      +'<p style="font-weight:900;color:#475569;font-size:15px;">ไม่มีแผนวันนี้</p>'
      +'<p style="font-size:13px;margin-top:6px;color:#334155;">'+esc(_sess.driver_name||_sess.username)+'</p></div>';
    document.getElementById('st-total').textContent=0;
    document.getElementById('st-done').textContent=0;return;
  }
  var done=plans.filter(function(p){var l=_tripLogs[p.plan_id];return l&&l.status==='completed';}).length;
  document.getElementById('st-total').textContent=plans.length;
  document.getElementById('st-done').textContent=done;

  var statusMeta={
    idle:{color:'#475569',label:'รอเริ่มงาน',icon:'fa-clock',border:'#334155',btnBg:'#059669',btnLabel:'🚀 เริ่มงาน'},
    traveling:{color:'#3b82f6',label:'กำลังเดินทาง',icon:'fa-truck-moving',border:'#1d4ed8',btnBg:'#1d4ed8',btnLabel:'▶ ดำเนินการต่อ'},
    at_shop:{color:'#f59e0b',label:'อยู่ที่ร้าน',icon:'fa-store',border:'#d97706',btnBg:'#d97706',btnLabel:'▶ ดำเนินการต่อ'},
    returning:{color:'#a78bfa',label:'กำลังกลับ',icon:'fa-route',border:'#7c3aed',btnBg:'#7c3aed',btnLabel:'▶ ดำเนินการต่อ'},
    completed:{color:'#34d399',label:'เสร็จสิ้น',icon:'fa-check-circle',border:'#059669',btnBg:'#1e3a8a',btnLabel:'📋 ดูสรุป'}
  };

  wrap.innerHTML=plans.map(function(p,pi){
    var log=_tripLogs[p.plan_id];
    var st=log?log.status:'idle';
    var m=statusMeta[st]||statusMeta.idle;
    var shops=p.shops||[];
    var seq=log?log.current_shop_seq:0;
    var currentShop=shops[seq];
    var contextLine='';
    if(st==='traveling'&&currentShop){
      contextLine='<div style="background:#1e3a8a;border-radius:10px;padding:7px 12px;margin-bottom:10px;font-size:12px;color:#93c5fd;font-weight:700;">'
        +'<i class="fas fa-map-marker-alt" style="margin-right:5px;"></i>กำลังไป: '+esc(currentShop.shopName||currentShop.shopId||'–')+'</div>';
    }else if(st==='at_shop'&&currentShop){
      contextLine='<div style="background:#422006;border-radius:10px;padding:7px 12px;margin-bottom:10px;font-size:12px;color:#fbbf24;font-weight:700;">'
        +'<i class="fas fa-store" style="margin-right:5px;"></i>อยู่ที่: '+esc(currentShop.shopName||currentShop.shopId||'–')+'</div>';
    }
    var routeText=shops.map(function(sh){return esc(sh.shopName||sh.shopId||'–');}).join(' → ');
    return '<div class="fade-up card" style="border:2px solid '+m.border+';">'
      +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px;">'
      +'<div><div style="font-weight:900;color:#fff;font-size:16px;">เที่ยวที่ '+(pi+1)+'</div>'
      +'<div style="font-size:11px;color:#64748b;margin-top:2px;">'+esc(p.plan_id)+'</div></div>'
      +'<span style="font-size:11px;font-weight:900;color:'+m.color+';background:rgba(0,0,0,.3);padding:4px 10px;border-radius:20px;display:flex;align-items:center;gap:5px;flex-shrink:0;white-space:nowrap;">'
      +'<i class="fas '+m.icon+'" style="font-size:10px;"></i>'+m.label+'</span></div>'
      +contextLine
      +'<div style="font-size:12px;color:#64748b;margin-bottom:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'
      +'<i class="fas fa-map-signs" style="margin-right:5px;opacity:.6;"></i>'+routeText+'</div>'
      +'<div style="font-size:12px;color:#94a3b8;margin-bottom:12px;"><i class="fas fa-truck" style="margin-right:5px;"></i>'+esc(p.truck_plate||'–')+'</div>'
      +'<button onclick="openTrip(\''+esc(p.plan_id)+'\')" style="width:100%;background:'+m.btnBg+';border:none;border-radius:12px;padding:13px;color:#fff;font-weight:900;font-size:14px;cursor:pointer;">'+m.btnLabel+'</button>'
      +'</div>';
  }).join('');
}

// ══════════════════════════════════════════════════════════════
// TRIP DETAIL — state machine
// ══════════════════════════════════════════════════════════════
async function openTrip(planId){
  _tripPlan=_plans.find(function(p){return p.plan_id===planId;})||null;
  if(!_tripPlan)return;
  _capturedFile=null;_capturedPreviewUrl=null;_selectedShopSeq=null;
  showL();
  await loadTripState(planId);
  hideL();
  document.getElementById('trip-title').textContent=_tripPlan.plan_id;
  document.getElementById('trip-sub').textContent='🚛 '+(_tripPlan.truck_plate||'–')+' &bull; '+(_tripPlan.shops||[]).length+' จุดส่ง';
  renderTimeline();renderAction();
  var ts=document.getElementById('trip-screen');
  ts.style.display='flex';
  requestAnimationFrame(function(){ts.classList.add('open');});
}

function closeTrip(){
  clearInterval(_timerIv);_timerIv=null;
  var ts=document.getElementById('trip-screen');
  ts.classList.remove('open');
  setTimeout(function(){ts.style.display='none';},280);
  loadPlan();
}

async function loadTripState(planId){
  var {data:log}=await _sb.from('trip_logs').select('*').eq('plan_id',planId).maybeSingle();
  _tripLog=log||null;
  var {data:visits}=await _sb.from('shop_visits').select('*').eq('plan_id',planId);
  _shopVisits={};
  (visits||[]).forEach(function(v){_shopVisits[v.shop_seq]=v;});
}

// ── Timeline ─────────────────────────────────────────────────
function renderTimeline(){
  var shops=_tripPlan?(_tripPlan.shops||[]):[];
  var log=_tripLog;
  var st=log?log.status:'idle';

  // steps: start, shop0..N, end
  var steps=[{label:'ออก',key:'start'}]
    .concat(shops.map(function(sh,i){return{label:sh.shopName||('ร้าน'+(i+1)),key:'shop'+i,seq:i};}))
    .concat([{label:'กลับ',key:'end'}]);

  var html='<div style="display:inline-flex;align-items:center;gap:0;min-width:100%;padding-bottom:4px;">';
  steps.forEach(function(s,i){
    var dotColor,dotBg,icon,lineColor;
    if(i===0){
      // จุดออก
      var started=st!=='idle';
      dotColor=started?'#34d399':'#475569';
      dotBg=started?'#064e3b':'#1e293b';
      icon=started?'<i class="fas fa-check" style="font-size:9px;color:'+dotColor+';"></i>':'<span style="font-size:10px;font-weight:900;color:'+dotColor+';">S</span>';
      lineColor=started?'#34d399':'#334155';
    } else if(i===steps.length-1){
      // จุดกลับ
      var returned=(st==='returning'||st==='completed');
      dotColor=returned?'#34d399':'#475569';
      dotBg=returned?'#064e3b':'#1e293b';
      icon=returned?'<i class="fas fa-check" style="font-size:9px;color:'+dotColor+';"></i>':'<span style="font-size:10px;font-weight:900;color:'+dotColor+';">E</span>';
      lineColor='#334155';
    } else {
      // ร้านค้า — เช็คจาก _shopVisits
      var sv=_shopVisits[s.seq];
      var isDepart=sv&&sv.departed_at;
      var isArrive=sv&&sv.arrived_at&&!sv.departed_at;
      dotColor=isDepart?'#34d399':isArrive?'#fbbf24':'#475569';
      dotBg=isDepart?'#064e3b':isArrive?'#422006':'#1e293b';
      icon=isDepart?'<i class="fas fa-check" style="font-size:9px;color:'+dotColor+';"></i>'
          :isArrive?'<i class="fas fa-circle" style="font-size:9px;color:'+dotColor+';"></i>'
          :'<span style="font-size:10px;font-weight:900;color:'+dotColor+';">'+i+'</span>';
      lineColor=isDepart?'#34d399':'#334155';
    }
    html+='<div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0;">'
      +'<div style="width:26px;height:26px;border-radius:50%;background:'+dotBg+';border:2px solid '+dotColor+';display:flex;align-items:center;justify-content:center;">'+icon+'</div>'
      +'<div style="font-size:9px;font-weight:700;color:'+dotColor+';margin-top:3px;max-width:48px;text-align:center;white-space:normal;line-height:1.2;">'+esc(s.label)+'</div>'
      +'</div>';
    if(i<steps.length-1){
      html+='<div style="flex:1;min-width:10px;height:2px;background:'+lineColor+';margin-bottom:14px;"></div>';
    }
  });
  html+='</div>';
  document.getElementById('trip-timeline').innerHTML=html;
}

// ── Action renderer ──────────────────────────────────────────
function renderAction(){
  clearInterval(_timerIv);_timerIv=null;
  var st=_tripLog?_tripLog.status:'idle';
  var el=document.getElementById('trip-action');
  if(st==='idle')         el.innerHTML=renderIdle();
  else if(st==='traveling')el.innerHTML=renderTraveling();
  else if(st==='at_shop') el.innerHTML=renderAtShop();
  else if(st==='returning')el.innerHTML=renderReturning();
  else if(st==='completed')el.innerHTML=renderCompleted();
  // Start countdown timer for traveling
  if(st==='traveling'){
    _timerIv=setInterval(tickTravelTimer,1000);
    tickTravelTimer();
  }
}

function renderIdle(){
  var shops=_tripPlan?(_tripPlan.shops||[]):[];
  var shopList=shops.map(function(sh,i){
    return '<div style="display:flex;align-items:center;gap:10px;padding:9px 0;'+(i<shops.length-1?'border-bottom:1px solid rgba(255,255,255,.05);':'')+'">'
      +'<div style="width:26px;height:26px;border-radius:50%;background:#0f172a;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#64748b;flex-shrink:0;">'+(i+1)+'</div>'
      +'<div style="font-weight:700;color:#e2e8f0;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc(sh.shopName||sh.shopId||'–')+'</div>'
      +'</div>';
  }).join('');
  return '<div class="fade-up">'
    +'<div class="card">'
    +'<div style="font-size:10px;font-weight:900;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;">📋 รายการจุดส่งทั้งหมด</div>'
    +shopList
    +'</div>'
    +'<div class="card">'
    +'<div style="font-size:10px;font-weight:900;color:#6ee7b7;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">ไมล์ออกจากโรงงาน (หน้าปัดรถ)</div>'
    +'<input id="inp-mile-start" type="number" inputmode="numeric" placeholder="เช่น 125000" class="inp" style="margin-bottom:8px;">'
    +'<div style="font-size:11px;color:#64748b;text-align:center;margin-bottom:16px;"><i class="fas fa-map-marker-alt" style="color:#34d399;margin-right:4px;"></i>GPS จะถูกบันทึกอัตโนมัติ</div>'
    +'<button class="btn-main" style="background:#059669;" onclick="doStartTrip()"><i class="fas fa-play"></i> เริ่มเดินทาง</button>'
    +'</div></div>';
}

function renderTraveling(){
  var shops=_tripPlan.shops||[];
  // ร้านที่ยังไม่ได้ส่ง (ยังไม่มี departed_at)
  var unvisited=shops.filter(function(sh,i){return !(_shopVisits[i]&&_shopVisits[i].departed_at);});
  var sel=_selectedShopSeq;
  var selShop=sel!==null&&sel!==undefined?shops[sel]:null;

  // ส่วนเลือกร้าน
  var shopBtns=shops.map(function(sh,i){
    var sv=_shopVisits[i];
    var done=sv&&sv.departed_at;
    if(done)return ''; // ส่งแล้ว ไม่แสดง
    var isSelected=sel===i;
    return '<button onclick="selectShop('+i+')" style="width:100%;text-align:left;background:'+(isSelected?'#1e3a8a':'#0f172a')+';border:2px solid '+(isSelected?'#3b82f6':'#334155')+';border-radius:12px;padding:12px 14px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;gap:10px;">'
      +'<div style="width:28px;height:28px;border-radius:50%;background:'+(isSelected?'#3b82f6':'#1e293b')+';display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:'+(isSelected?'#fff':'#64748b')+';flex-shrink:0;">'+(i+1)+'</div>'
      +'<div>'+esc(sh.shopName||sh.shopId||'–')+(sv&&sv.arrived_at?'<span style="font-size:10px;color:#fbbf24;margin-left:6px;">📦 อยู่ที่ร้านนี้</span>':'')+'</div>'
      +'</button>';
  }).join('');

  var arriveSection=selShop?('<div class="card" style="margin-top:0;">'
    +'<div style="font-size:10px;font-weight:900;color:#6ee7b7;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">ไมล์เมื่อถึงร้าน (หน้าปัดรถ)</div>'
    +'<input id="inp-mile-arr" type="number" inputmode="numeric" placeholder="เช่น 125060" class="inp" style="margin-bottom:10px;">'
    +'<div id="travel-countdown-box" style="display:none;background:#1e3a8a;border-radius:10px;padding:10px;text-align:center;font-size:12px;font-weight:700;color:#93c5fd;margin-bottom:10px;">'
    +'<i class="fas fa-clock" style="margin-right:5px;"></i>รออีก <span id="travel-countdown">–</span> วินาที ก่อนกดถึงร้านได้</div>'
    +'<button id="btn-arrive" class="btn-main" style="background:#059669;" onclick="doArriveAtShop()"><i class="fas fa-store"></i> ถึง '+esc(selShop.shopName||selShop.shopId||'ร้าน')+' แล้ว</button>'
    +'</div>'):'';

  var elapsedCard='<div class="card" style="padding:10px 14px;display:flex;justify-content:space-between;align-items:center;">'
    +'<span style="font-size:11px;color:#64748b;"><i class="fas fa-clock" style="margin-right:4px;"></i>เวลาที่ใช้เดินทาง</span>'
    +'<span id="travel-elapsed" style="font-size:14px;font-weight:900;color:#fbbf24;">–</span></div>';

  return '<div class="fade-up">'
    +elapsedCard
    +'<div class="card">'
    +'<div style="font-size:10px;font-weight:900;color:#93c5fd;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;"><i class="fas fa-map-marker-alt" style="margin-right:5px;"></i>เลือกร้านที่จะไปถึง ('+unvisited.length+' ร้านคงเหลือ)</div>'
    +shopBtns
    +'</div>'
    +arriveSection
    +'</div>';
}

function selectShop(seq){
  _selectedShopSeq=seq;
  _capturedFile=null;_capturedPreviewUrl=null;
  renderAction();
}

function tickTravelTimer(){
  if(!_tripLog||_tripLog.status!=='traveling')return;
  var refTime=_tripLog.started_at;
  Object.values(_shopVisits).forEach(function(sv){if(sv.departed_at&&sv.departed_at>refTime)refTime=sv.departed_at;});
  if(!refTime)return;
  var elEl=document.getElementById('travel-elapsed');
  var cdBox=document.getElementById('travel-countdown-box');
  var cdEl=document.getElementById('travel-countdown');
  var btnEl=document.getElementById('btn-arrive');
  if(!elEl)return;
  var elapsed=Math.floor((Date.now()-new Date(refTime).getTime())/1000);
  var m=Math.floor(elapsed/60),s=elapsed%60;
  elEl.textContent=m+' นาที '+p2(s)+' วิ';
  var remain=TEST_MODE?0:remainSecs(refTime);
  if(remain>0){
    if(cdBox)cdBox.style.display='block';
    if(cdEl)cdEl.textContent=remain;
    if(btnEl)btnEl.disabled=true;
  }else{
    if(cdBox)cdBox.style.display='none';
    if(btnEl)btnEl.disabled=false;
  }
}

function renderAtShop(){
  var seq=_selectedShopSeq!==null&&_selectedShopSeq!==undefined?_selectedShopSeq:_tripLog.current_shop_seq;
  var shops=_tripPlan.shops||[];
  var shop=shops[seq]||{};
  var visit=_shopVisits[seq]||{};
  // isLast = ถ้าออกจากร้านนี้แล้ว ไม่มีร้านอื่นเหลือ
  var remaining=shops.filter(function(sh,i){return i!==seq&&!(_shopVisits[i]&&_shopVisits[i].departed_at);});
  var isLast=remaining.length===0;
  var hasPhoto=!!_capturedPreviewUrl;

  var photoHtml=hasPhoto
    ?'<div style="position:relative;margin-bottom:10px;">'
      +'<img src="'+_capturedPreviewUrl+'" style="width:100%;max-height:220px;object-fit:cover;border-radius:12px;">'
      +'<div style="position:absolute;top:8px;right:8px;background:rgba(5,150,105,.92);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:900;color:#fff;"><i class="fas fa-check" style="margin-right:4px;"></i>ถ่ายแล้ว</div>'
      +'</div>'
      +'<button class="btn-secondary" style="margin-bottom:10px;" onclick="openCamera()"><i class="fas fa-redo"></i> ถ่ายใหม่</button>'
    :'<button class="btn-main" style="background:#d97706;margin-bottom:10px;" onclick="openCamera()"><i class="fas fa-camera"></i> ถ่ายรูปส่งของ (บังคับ)</button>'
      +'<div style="font-size:11px;color:#f59e0b;text-align:center;margin-bottom:10px;">⚠️ ต้องมีรูปก่อนออกจากร้านได้</div>';

  var canDepart=hasPhoto||TEST_MODE;
  var actionHtml=isLast
    ?'<button class="btn-main" style="background:#7c3aed;" onclick="doDepartShop(true)" '+(canDepart?'':'disabled')+'>'
      +'<i class="fas fa-industry"></i> ส่งเสร็จ — กลับบริษัท</button>'
    :'<button class="btn-main" style="background:#059669;" onclick="doDepartShop(false)" '+(canDepart?'':'disabled')+'>'
      +'<i class="fas fa-arrow-right"></i> ส่งเสร็จ — ไปร้านถัดไป</button>';

  return '<div class="fade-up">'
    +'<div class="card" style="border:2px solid #d97706;">'
    +'<div style="font-size:10px;font-weight:900;color:#fbbf24;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;"><i class="fas fa-store" style="margin-right:5px;"></i>อยู่ที่ร้าน</div>'
    +'<div style="font-size:22px;font-weight:900;color:#fff;margin-bottom:4px;line-height:1.2;">'+esc(shop.shopName||shop.shopId||'–')+'</div>'
    +'<div style="font-size:12px;color:#64748b;">จุดส่งที่ '+(seq+1)+' จาก '+shops.length+'</div>'
    +(visit.arrived_at?'<div style="font-size:12px;color:#94a3b8;margin-top:6px;"><i class="fas fa-clock" style="margin-right:4px;"></i>ถึงเวลา '+fmtTime(visit.arrived_at)+'</div>':'')
    +'</div>'
    +'<div class="card">'
    +'<div style="font-size:10px;font-weight:900;color:#6ee7b7;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;"><i class="fas fa-camera" style="margin-right:5px;"></i>หลักฐานการส่งของ</div>'
    +photoHtml+actionHtml
    +'</div></div>';
}

function renderReturning(){
  var shops=_tripPlan.shops||[];
  return '<div class="fade-up">'
    +'<div class="card" style="border:2px solid #7c3aed;text-align:center;">'
    +'<div style="font-size:32px;margin-bottom:8px;">✅</div>'
    +'<div style="font-size:18px;font-weight:900;color:#c4b5fd;">ส่งครบ '+shops.length+' ร้านแล้ว</div>'
    +'<div style="font-size:13px;color:#64748b;margin-top:4px;">กำลังกลับบริษัท</div>'
    +'</div>'
    +'<div class="card">'
    +'<div style="font-size:10px;font-weight:900;color:#6ee7b7;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">ไมล์เมื่อถึงบริษัท (หน้าปัดรถ)</div>'
    +'<input id="inp-mile-end" type="number" inputmode="numeric" placeholder="เช่น 125120" class="inp" style="margin-bottom:8px;">'
    +'<div style="font-size:11px;color:#64748b;text-align:center;margin-bottom:16px;"><i class="fas fa-map-marker-alt" style="color:#34d399;margin-right:4px;"></i>GPS จะถูกบันทึกอัตโนมัติ</div>'
    +'<button class="btn-main" style="background:#7c3aed;" onclick="doFinishTrip()"><i class="fas fa-flag-checkered"></i> ถึงบริษัท / จบงาน</button>'
    +'</div></div>';
}

function renderCompleted(){
  var log=_tripLog;
  var shops=_tripPlan.shops||[];
  var visits=Object.values(_shopVisits).sort(function(a,b){return a.shop_seq-b.shop_seq;});
  var km=(log.mileage_end&&log.mileage_start)?(log.mileage_end-log.mileage_start):null;
  var dur=fmtDuration(log.started_at,log.completed_at);
  return '<div class="fade-up">'
    +'<div class="card" style="border:2px solid #059669;text-align:center;">'
    +'<div style="font-size:40px;margin-bottom:8px;">🎉</div>'
    +'<div style="font-size:20px;font-weight:900;color:#34d399;">จบงานเรียบร้อย!</div>'
    +'</div>'
    +'<div class="card">'
    +'<div style="font-size:10px;font-weight:900;color:#6ee7b7;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;">📊 สรุปการเดินทาง</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">'
    +'<div style="background:#0f172a;border-radius:10px;padding:10px;text-align:center;">'
    +'<div style="font-size:18px;font-weight:900;color:#34d399;">'+(km!==null?km:'–')+'</div>'
    +'<div style="font-size:9px;color:#64748b;margin-top:2px;">กม.รวม</div></div>'
    +'<div style="background:#0f172a;border-radius:10px;padding:10px;text-align:center;">'
    +'<div style="font-size:14px;font-weight:900;color:#34d399;">'+dur+'</div>'
    +'<div style="font-size:9px;color:#64748b;margin-top:2px;">เวลารวม</div></div>'
    +'<div style="background:#0f172a;border-radius:10px;padding:10px;text-align:center;">'
    +'<div style="font-size:18px;font-weight:900;color:#34d399;">'+shops.length+'</div>'
    +'<div style="font-size:9px;color:#64748b;margin-top:2px;">ร้านที่ส่ง</div></div>'
    +'</div></div>'
    +'<div class="card">'
    +'<div style="font-size:10px;font-weight:900;color:#6ee7b7;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;">📍 ประวัติการส่ง</div>'
    +visits.map(function(v){
      var sh=shops[v.shop_seq]||{};
      return '<div style="display:flex;align-items:center;gap:10px;padding:10px 0;'+(v.shop_seq<shops.length-1?'border-bottom:1px solid rgba(255,255,255,.05);':'')+'">'
        +'<div style="width:28px;height:28px;border-radius:50%;background:#064e3b;display:flex;align-items:center;justify-content:center;flex-shrink:0;">'
        +'<i class="fas fa-check" style="font-size:10px;color:#34d399;"></i></div>'
        +'<div style="flex:1;min-width:0;">'
        +'<div style="font-weight:700;color:#e2e8f0;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc(sh.shopName||sh.shopId||v.shop_name||'–')+'</div>'
        +'<div style="font-size:11px;color:#64748b;margin-top:1px;">ถึง '+fmtTime(v.arrived_at)+' &bull; ออก '+fmtTime(v.departed_at)+'</div>'
        +'</div>'
        +(v.photo_url
          ?'<a href="'+v.photo_url+'" target="_blank"><img src="'+v.photo_url+'" style="width:44px;height:44px;border-radius:8px;object-fit:cover;border:1px solid #334155;"></a>'
          :'<div style="width:44px;height:44px;border-radius:8px;background:#1e293b;display:flex;align-items:center;justify-content:center;"><i class="fas fa-image" style="color:#334155;font-size:16px;"></i></div>')
        +'</div>';
    }).join('')
    +'</div></div>';
}

// ══════════════════════════════════════════════════════════════
// TRIP ACTIONS (state transitions)
// ══════════════════════════════════════════════════════════════

async function doStartTrip(){
  var mile=parseInt((document.getElementById('inp-mile-start')||{}).value||'');
  if(TEST_MODE&&(!mile||mile<=0))mile=100000; // ค่า default สำหรับทดสอบ
  if(!mile||mile<=0){showToast('❌ กรอกเลขไมล์ออกให้ถูกต้อง',true);return;}
  showL();
  var gps=await requireGPS();if(!gps){hideL();return;}
  var now=new Date().toISOString();
  var {data,error}=await _sb.from('trip_logs').insert({
    plan_id:_tripPlan.plan_id,driver_username:_sess.username,
    status:'traveling',current_shop_seq:0,
    mileage_start:mile,lat_start:gps.lat,lng_start:gps.lng,acc_start:gps.acc,
    started_at:now,updated_at:now
  }).select().single();
  hideL();
  if(error){showToast('❌ '+error.message,true);return;}
  _tripLog=data;_tripLogs[_tripPlan.plan_id]=data;
  // อัพเดทสถานะแผนใน WMS → inprogress
  await _sb.from('logistic_plans').update({status:'inprogress'}).eq('plan_id',_tripPlan.plan_id);
  renderTimeline();renderAction();
  showToast('✅ เริ่มเดินทาง — GPS บันทึกแล้ว (±'+gps.acc+'ม.)');
}

async function doArriveAtShop(){
  var seq=_selectedShopSeq!==null&&_selectedShopSeq!==undefined?_selectedShopSeq:_tripLog.current_shop_seq;
  var shops=_tripPlan.shops||[];
  var shop=shops[seq]||{};
  if(!shop.shopId&&!shop.shopName){showToast('❌ เลือกร้านก่อน',true);return;}
  // Time guard (bypass ใน TEST_MODE) — ใช้เวลาออกร้านล่าสุด หรือเวลาเริ่มเดินทาง
  if(!TEST_MODE){
    var lastDepart=_tripLog.started_at;
    Object.values(_shopVisits).forEach(function(sv){
      if(sv.departed_at&&sv.departed_at>lastDepart)lastDepart=sv.departed_at;
    });
    var remain=remainSecs(lastDepart);
    if(remain>0){showToast('❌ ต้องเดินทางอย่างน้อย '+MIN_TRAVEL_MINS+' นาที (เหลือ '+remain+' วิ)',true);return;}
  }
  // Mileage guard — minMile คือไมล์สูงสุดที่บันทึกไว้แล้ว
  var mile=parseInt((document.getElementById('inp-mile-arr')||{}).value||'');
  var minMile=_tripLog.mileage_start||0;
  Object.values(_shopVisits).forEach(function(sv){if(sv.mileage_arrival>minMile)minMile=sv.mileage_arrival;});
  if(TEST_MODE&&(!mile||mile<=minMile))mile=minMile+10;
  if(!mile||mile<=0){showToast('❌ กรอกเลขไมล์ถึงร้านให้ถูกต้อง',true);return;}
  if(mile<=minMile){showToast('❌ ไมล์ถึงร้านต้องมากกว่า '+minMile,true);return;}
  showL();
  var gps=await requireGPS();if(!gps){hideL();return;}
  // Distance guard (bypass ใน TEST_MODE) — ใช้พิกัดล่าสุดที่ออกจากร้าน
  if(!TEST_MODE){
    var prevLat=_tripLog.lat_start,prevLng=_tripLog.lng_start;
    Object.values(_shopVisits).forEach(function(sv){
      if(sv.departed_at){prevLat=sv.lat_depart||sv.lat_arrival;prevLng=sv.lng_depart||sv.lng_arrival;}
    });
    if(prevLat&&prevLng){
      var moved=Math.round(haversineM(prevLat,prevLng,gps.lat,gps.lng));
      if(moved<MIN_MOVE_METERS){
        hideL();
        showToast('❌ พิกัดยังอยู่ใกล้จุดก่อนหน้าเกินไป (ห่างแค่ '+moved+' ม. ต้องมากกว่า '+MIN_MOVE_METERS+' ม.)',true);
        return;
      }
    }
  }
  var now=new Date().toISOString();
  // Insert shop_visit
  var {data:visitData,error:ve}=await _sb.from('shop_visits').insert({
    plan_id:_tripPlan.plan_id,shop_seq:seq,shop_name:shop.shopName||shop.shopId||'',
    mileage_arrival:mile,lat_arrival:gps.lat,lng_arrival:gps.lng,acc_arrival:gps.acc,arrived_at:now
  }).select().single();
  // Update trip_log
  var {data:newLog,error:le}=await _sb.from('trip_logs').update({status:'at_shop',updated_at:now})
    .eq('plan_id',_tripPlan.plan_id).select().single();
  hideL();
  if(ve||le){showToast('❌ '+(ve||le).message,true);return;}
  _tripLog=newLog;_shopVisits[seq]=visitData;
  renderTimeline();renderAction();
  showToast('✅ บันทึกถึงร้าน — GPS ±'+gps.acc+'ม.');
}

function openCamera(){
  var inp=document.getElementById('photo-input');
  inp.value='';inp.click();
}

function handlePhotoSelected(input){
  var file=input.files[0];if(!file)return;
  _capturedFile=file;
  if(_capturedPreviewUrl)URL.revokeObjectURL(_capturedPreviewUrl);
  _capturedPreviewUrl=URL.createObjectURL(file);
  renderAction();
}

async function doDepartShop(isLast){
  if(!TEST_MODE&&!_capturedFile){showToast('❌ ต้องถ่ายรูปก่อนออกจากร้าน',true);return;}
  var seq=_selectedShopSeq!==null&&_selectedShopSeq!==undefined?_selectedShopSeq:_tripLog.current_shop_seq;
  var shops=_tripPlan.shops||[];
  showL();
  var gps=await requireGPS();if(!gps){hideL();return;}
  var now=new Date().toISOString();
  // Upload photo (ข้าม upload ใน TEST_MODE)
  var photoUrl=null;
  if(_capturedFile){
    try{
      var ext=(_capturedFile.name||'photo.jpg').split('.').pop()||'jpg';
      var path=_tripPlan.plan_id+'/'+seq+'/'+Date.now()+'.'+ext;
      var {error:ue}=await _sb.storage.from(PHOTO_BUCKET).upload(path,_capturedFile,{contentType:_capturedFile.type||'image/jpeg',upsert:true});
      if(ue)throw ue;
      var {data:ud}=_sb.storage.from(PHOTO_BUCKET).getPublicUrl(path);
      photoUrl=ud.publicUrl;
    }catch(e){
      hideL();
      showToast('❌ อัพโหลดรูปไม่ได้ — ตรวจสอบ Storage Bucket "'+PHOTO_BUCKET+'"',true);return;
    }
  }
  // Update shop_visit with departure + photo
  var visit=_shopVisits[seq]||{};
  var updateFn=visit.id
    ?_sb.from('shop_visits').update({departed_at:now,photo_url:photoUrl,lat_depart:gps.lat,lng_depart:gps.lng}).eq('id',visit.id)
    :_sb.from('shop_visits').update({departed_at:now,photo_url:photoUrl,lat_depart:gps.lat,lng_depart:gps.lng}).eq('plan_id',_tripPlan.plan_id).eq('shop_seq',seq);
  await updateFn;
  // คำนวณว่ายังเหลือร้านอื่นไหม (รวมร้านที่เพิ่งออกไปแล้ว)
  var updatedVisits=Object.assign({},_shopVisits);
  updatedVisits[seq]=Object.assign({},updatedVisits[seq]||{},{departed_at:now});
  var allDone=shops.every(function(sh,i){return updatedVisits[i]&&updatedVisits[i].departed_at;});
  var nextStatus=allDone?'returning':'traveling';
  var {data:newLog,error:le}=await _sb.from('trip_logs').update({
    status:nextStatus,current_shop_seq:seq,updated_at:now
  }).eq('plan_id',_tripPlan.plan_id).select().single();
  hideL();
  if(le){showToast('❌ '+le.message,true);return;}
  if(_shopVisits[seq])_shopVisits[seq]={..._shopVisits[seq],departed_at:now,photo_url:photoUrl};
  _tripLog=newLog;_capturedFile=null;_capturedPreviewUrl=null;_selectedShopSeq=null;
  renderTimeline();renderAction();
  showToast(allDone?'✅ ส่งครบ! กลับบริษัทได้เลย':'✅ ออกจากร้าน — เลือกร้านถัดไป');
}

async function doFinishTrip(){
  var mile=parseInt((document.getElementById('inp-mile-end')||{}).value||'');
  if(TEST_MODE&&(!mile||mile<=_tripLog.mileage_start))mile=(_tripLog.mileage_start||100000)+50;
  if(!mile||mile<=0){showToast('❌ กรอกเลขไมล์กลับให้ถูกต้อง',true);return;}
  if(mile<=_tripLog.mileage_start){showToast('❌ ไมล์กลับต้องมากกว่าไมล์ออก ('+_tripLog.mileage_start+')',true);return;}
  showL();
  var gps=await requireGPS();if(!gps){hideL();return;}
  var now=new Date().toISOString();
  var {data:newLog,error}=await _sb.from('trip_logs').update({
    status:'completed',mileage_end:mile,lat_end:gps.lat,lng_end:gps.lng,acc_end:gps.acc,
    completed_at:now,updated_at:now
  }).eq('plan_id',_tripPlan.plan_id).select().single();
  hideL();
  if(error){showToast('❌ '+error.message,true);return;}
  _tripLog=newLog;_tripLogs[_tripPlan.plan_id]=newLog;
  // อัพเดทสถานะแผนใน WMS → success
  await _sb.from('logistic_plans').update({status:'success'}).eq('plan_id',_tripPlan.plan_id);
  // บันทึก driver_activity_log — 1 แถวต่อร้าน
  try {
    var delivDate=newLog.started_at?newLog.started_at.slice(0,10):now.slice(0,10);
    var totalKm=newLog.mileage_end&&newLog.mileage_start?(newLog.mileage_end-newLog.mileage_start):null;
    var shops=_tripPlan.shops||[];
    var dalRows=shops.map(function(sh,idx){
      var sv=_shopVisits[idx]||{};
      var tDep=newLog.started_at?newLog.started_at.slice(11,16):'';
      var tArr=sv.arrived_at?sv.arrived_at.slice(11,16):'';
      var tDep2=sv.departed_at?sv.departed_at.slice(11,16):'';
      var travelMin=null,kmhr=null;
      if(tDep&&tArr){
        var depM=parseInt(tDep.split(':')[0])*60+parseInt(tDep.split(':')[1]);
        var arrM=parseInt(tArr.split(':')[0])*60+parseInt(tArr.split(':')[1]);
        var diff=arrM-depM;
        if(diff>0){travelMin=diff;if(totalKm)kmhr=Math.round(totalKm/(diff/60)*10)/10;}
      }
      return {
        delivery_date:    delivDate,
        driver_name:      _sess.driver_name||_sess.username||null,
        truck_plate:      _tripPlan.truck_plate||null,
        mileage_start:    newLog.mileage_start||null,
        mileage_end:      newLog.mileage_end||null,
        time_depart:      tDep||null,
        time_arrive:      tDep2||tArr||null,
        shop_code:        sh.shopId||null,
        shop_name:        sh.shopName||null,
        distance_km:      totalKm||null,
        travel_minutes:   travelMin,
        km_per_hr:        kmhr,
        planned_distance: parseFloat(sh.distance)||null,
        sale:             sh.sale||null,
        recorded_at:      now
      };
    });
    if(dalRows.length) await _sb.from('driver_activity_log').insert(dalRows);
  } catch(e){ console.warn('driver_activity_log insert failed',e); }
  renderTimeline();renderAction();
  showToast('🎉 จบงานเรียบร้อย!');
}

// ══════════════════════════════════════════════════════════════
// HISTORY
// ══════════════════════════════════════════════════════════════
async function histLoad(){
  var from=document.getElementById('hf').value;
  var to=document.getElementById('ht2').value;
  if(!from||!to){showToast('❌ เลือกช่วงวันที่ก่อน',true);return;}
  showL();
  var {data:logs,error}=await _sb.from('trip_logs').select('*')
    .eq('driver_username',_sess.username)
    .gte('started_at',from+'T00:00:00.000Z')
    .lte('started_at',to+'T23:59:59.999Z')
    .order('started_at',{ascending:false});
  hideL();
  var list=document.getElementById('hist-list');
  if(error||!logs||!logs.length){
    list.innerHTML='<div style="text-align:center;padding:40px 0;color:#334155;font-weight:700;font-size:13px;">ไม่พบข้อมูลในช่วงวันที่นี้</div>';return;
  }
  var stColor={completed:'#059669',returning:'#7c3aed',traveling:'#3b82f6',at_shop:'#f59e0b',idle:'#475569'};
  var stLabel={completed:'เสร็จสิ้น',returning:'กลับบริษัท',traveling:'เดินทาง',at_shop:'ที่ร้าน',idle:'ยังไม่เริ่ม'};
  list.innerHTML=logs.map(function(l){
    var km=l.mileage_end&&l.mileage_start?(l.mileage_end-l.mileage_start):null;
    var dateStr=l.started_at?new Date(l.started_at).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit'})+' '+fmtTime(l.started_at):'–';
    return '<div class="card" style="margin-bottom:8px;">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">'
      +'<div style="font-weight:900;color:#fff;font-size:14px;">'+esc(l.plan_id)+'</div>'
      +'<span style="font-size:11px;font-weight:700;color:'+(stColor[l.status]||'#475569')+'">'+(stLabel[l.status]||l.status)+'</span></div>'
      +'<div style="font-size:12px;color:#64748b;">'+dateStr
      +(km!==null?' &bull; '+km+' กม.':'')
      +(l.completed_at?' &bull; จบ '+fmtTime(l.completed_at):'')
      +'</div></div>';
  }).join('');
}
